spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${testcharm.game2048.jdbc-url}
    username: ${TESTCHARM_MYSQL_USER:game2048}
    password: ${TESTCHARM_MYSQL_PASSWORD:game2048}
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        implicit_naming_strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        jdbc:
          time_zone: UTC
          lob:
            non_contextual_creation: true

testcharm:
  dal:
    dumpinput: ${TESTCHARM_DAL_DUMPINPUT:true}
  app:
    command: ${TESTCHARM_DOTNET_COMMAND:dotnet}
  game2048:
    base-url: ${TESTCHARM_GAME2048_BASE_URL:http://127.0.0.1:5000}
    database-name: ${TESTCHARM_GAME2048_DATABASE:game2048_e2e}
    connection-string: Server=${TESTCHARM_MYSQL_HOST:127.0.0.1};Port=${TESTCHARM_MYSQL_PORT:53306};Database=${testcharm.game2048.database-name};User ID=${TESTCHARM_MYSQL_USER:game2048};Password=${TESTCHARM_MYSQL_PASSWORD:game2048};SslMode=None;AllowPublicKeyRetrieval=True;
    jdbc-url: jdbc:mysql://${TESTCHARM_MYSQL_HOST:127.0.0.1}:${TESTCHARM_MYSQL_PORT:53306}/${testcharm.game2048.database-name}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    forced-tile-value: ${TESTCHARM_GAME2048_FORCED_TILE_VALUE:2}

mock-server:
  endpoint: ${TESTCHARM_MOCK_SERVER_ENDPOINT:http://127.0.0.1:51081}
