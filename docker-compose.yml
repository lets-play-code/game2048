services:
  mysql8:
    image: mysql:8.0.41
    ports:
      - "53306:3306"
    environment:
      MYSQL_DATABASE: game2048
      MYSQL_USER: game2048
      MYSQL_PASSWORD: game2048
      MYSQL_ROOT_PASSWORD: game2048-root
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ugame2048 -pgame2048"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql8-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro

  mockserver:
    image: mockserver/mockserver:5.13.2
    platform: linux/amd64
    ports:
      - "51081:1080"
    environment:
      MOCKSERVER_LOG_LEVEL: WARN

volumes:
  mysql8-data:
